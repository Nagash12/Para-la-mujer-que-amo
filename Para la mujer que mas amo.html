<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti... ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@700&family=Montserrat:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #2a0000 0%, #000000 100%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        .screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #ff4d4d;
            text-shadow: 0 0 20px rgba(255, 77, 77, 0.6);
            margin-bottom: 20px;
        }

        .phrase {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: #f8c291;
            text-shadow: 0 0 10px rgba(248, 194, 145, 0.5);
            min-height: 100px;
        }

        .btn-start {
            background: transparent;
            border: 2px solid #ff4d4d;
            color: #ff4d4d;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
            margin-top: 30px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-start:hover {
            background: #ff4d4d;
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.8);
            transform: scale(1.05);
        }

        .buttons-container {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            position: relative;
            width: 100%;
            justify-content: center;
            height: 100px;
        }

        .btn-action {
            background: linear-gradient(45deg, #ff0055, #ff4d4d);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Dancing Script', cursive;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
            transition: transform 0.2s;
        }

        .btn-action:hover {
            transform: scale(1.1);
        }

        #btn-no {
            background: transparent;
            border: 1px solid #777;
            color: #aaa;
            box-shadow: none;
            position: relative;
        }

        .heart-beat {
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        .seductive-text {
            font-size: 1.2rem;
            color: #ccc;
            margin-top: 20px;
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .phrase { font-size: 1.4rem; }
            .btn-action { padding: 12px 30px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <!-- Pantalla 1: Inicio -->
        <div id="screen-1" class="screen active">
            <h1 class="heart-beat">Tengo un secreto... 🤫</h1>
            <p class="seductive-text">Atrévete a descubrirlo</p>
            <button class="btn-start" onclick="startJourney()">Tócame ❤️</button>
        </div>

        <!-- Pantalla 2: Frases Románticas -->
        <div id="screen-2" class="screen">
            <div id="text-container" class="phrase"></div>
        </div>

        <!-- Pantalla 3: La Propuesta -->
        <div id="screen-3" class="screen">
            <h1>Me vuelves loco... 🔥</h1>
            <p class="seductive-text" style="font-size: 1.5rem; color: #fff;">¿Quieres ser el amor de mi vida?</p>
            <div class="buttons-container">
                <button id="btn-yes" class="btn-action" onclick="sayYes()">¡SÍ, QUIERO! 😍</button>
                <button id="btn-no" class="btn-action">No 😒</button>
            </div>
        </div>

        <!-- Pantalla 4: Éxito -->
        <div id="screen-4" class="screen">
            <h1 class="heart-beat">¡Sabía que dirías que sí! 🤤🔥</h1>
            <p class="seductive-text" style="font-size: 1.5rem;">Prepárate, porque esto apenas comienza... 🌹✨</p>
        </div>
    </div>

    <script>
        // --- Animación de Fondo (Canvas HTML5) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < 0) {
                    this.y = height;
                    this.x = Math.random() * width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 77, 77, ${this.opacity})`;
                ctx.fill();
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateCanvas);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animateCanvas();

        // --- Lógica de la Interfaz ---
        const phrases = [
            "Desde la primera vez que te vi...",
            "Sentí una conexión que no puedo explicar ✨",
            "Tu sonrisa me desarma...",
            "Y tu mirada me hipnotiza 👁️",
            "Cada segundo contigo es un vicio...",
            "Y ya no quiero ser curado 🔥"
        ];

        function switchScreen(fromId, toId) {
            document.getElementById(fromId).classList.remove('active');
            setTimeout(() => {
                document.getElementById(toId).classList.add('active');
            }, 500); // Espera a que se desvanezca
        }

        function startJourney() {
            switchScreen('screen-1', 'screen-2');
            
            const textContainer = document.getElementById('text-container');
            let i = 0;

            function showNextPhrase() {
                if (i < phrases.length) {
                    textContainer.style.opacity = 0;
                    setTimeout(() => {
                        textContainer.innerHTML = phrases[i];
                        textContainer.style.opacity = 1;
                        i++;
                    }, 500);
                    setTimeout(showNextPhrase, 3500); // Tiempo entre frases
                } else {
                    switchScreen('screen-2', 'screen-3');
                }
            }

            setTimeout(showNextPhrase, 500);
        }

        // --- Botón Escurridizo ---
        const btnNo = document.getElementById('btn-no');
        
        // Función para mover el botón de forma aleatoria
        function moveButton() {
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 50) - (window.innerWidth/2) + 100;
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 50) - (window.innerHeight/2) + 100;
            
            btnNo.style.position = 'absolute';
            btnNo.style.transform = `translate(${x}px, ${y}px)`;
        }

        btnNo.addEventListener('mouseover', moveButton);
        btnNo.addEventListener('touchstart', moveButton);

        // --- Explosión de Amor (Al decir Sí) ---
        function sayYes() {
            switchScreen('screen-3', 'screen-4');
            // Aumentar la cantidad y velocidad de partículas
            for (let i = 0; i < 150; i++) {
                let p = new Particle();
                p.size = Math.random() * 5 + 2;
                p.speedY = Math.random() * 5 + 2;
                p.opacity = 1;
                particles.push(p);
            }
            createFireworks();
        }

        // --- Efecto extra de Corazones (Emojis flotando) ---
        function createFireworks() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = ['❤️','🔥','😍','✨'][Math.floor(Math.random() * 4)];
                heart.style.position = 'absolute';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                heart.style.transition = 'all 2s ease-out';
                heart.style.zIndex = 5;
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.style.top = '-10vh';
                    heart.style.transform = `rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                }, 10);

                setTimeout(() => {
                    heart.remove();
                }, 2000);
            }, 100);
        }
    </script>
</body>
</html>
